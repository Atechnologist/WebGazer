name: Compile WebGazer and Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up NodeJS Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install filemanager-webpack-plugin@3.0.0 --save-dev
          npm install

      - name: Compile WebGazer assets
        run: npm run build

      - name: Isolate and Package Web Assets
        run: |
          # 1. Create a clean, production-only deployment folder
          mkdir -p _site
          mkdir -p _site/dist
          mkdir -p _site/assets/css
          mkdir -p _site/assets/js

          # 2. Copy the natively compiled WebGazer bundle
          if [ -d "build" ] && [ "$(ls -A build)" ]; then
            cp -r build/* _site/dist/
          elif [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            cp -r dist/* _site/dist/
          fi

          # 3. Safely copy your personal UI assets and index file
          cp index.html _site/
          if [ -d "assets/css" ]; then cp -r assets/css/* _site/assets/css/; fi
          if [ -d "assets/js" ]; then cp -r assets/js/* _site/assets/js/; fi

          # 4. Print explicit layout check to GitHub Actions console log window
          echo "=== CLEAN PRODUCTION DEPLOYMENT MAP ==="
          ls -R _site

      - name: Upload Static Website Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Pointing directly to our clean folder bypasses node_modules conflicts entirely
          path: '_site'

  deploy-to-pages:
    needs: build-and-compile
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to Live Web URL
        id: deployment
        uses: actions/deploy-pages@v4
