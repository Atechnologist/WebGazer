name: Compile WebGazer and Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up NodeJS Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install filemanager-webpack-plugin@3.0.0 --save-dev
          npm install

      - name: Compile WebGazer assets
        run: npm run build

      - name: Verify and Organize Assets
        run: |
          # Ensure a target dist directory exists in the root for index.html to read
          mkdir -p dist
          
          # If the WebGazer build outputs files to a subfolder, copy them to the root dist folder
          if [ -d "build" ]; then
            cp -r build/* dist/ || true
          fi
          
          # Debug verification step so you can check the log tree state
          echo "=== Verifying packed site assets ==="
          ls -la
          ls -la dist/ || echo "Dist directory empty!"

      - name: Upload Static Website Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Uploads everything (index.html, assets/, and the verified dist/)
          path: '.'

  deploy-to-pages:
    needs: build-and-compile
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to Live Web URL
        id: deployment
        uses: actions/deploy-pages@v4
