name: Compile WebGazer and Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up NodeJS Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install filemanager-webpack-plugin@3.0.0 --save-dev
          npm install

      - name: Compile WebGazer assets
        run: npm run build

      - name: Structure and Inject Custom Layout Assets
        run: |
          # 1. WebGazer's build step cleans the dist/ folder, so we make sure it definitely exists now
          mkdir -p dist
          
          # 2. If WebGazer built into a variant 'build' folder, copy its contents to 'dist'
          if [ -d "build" ] && [ "$(ls -A build)" ]; then
            cp -r build/* dist/
          fi

          # 3. Handle standalone app script file fallback mappings
          mkdir -p assets/css assets/js
          
          # 4. Verify workspace integrity explicitly so logs show every file captured
          echo "=== VERIFYING ROOT DIRECTORY STATE ==="
          ls -la
          echo "=== VERIFYING DIST DIRECTORY STATE ==="
          ls -la dist/

      - name: Upload Static Website Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Packages your root (index.html), assets/, and your freshly populated dist/ folder
          path: '.'

  deploy-to-pages:
    needs: build-and-compile
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to Live Web URL
        id: deployment
        uses: actions/deploy-pages@v4
